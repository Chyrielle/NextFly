<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 30px;
            width: 340px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
        }
        h2 { text-align: center; margin-bottom: 20px; color: #333; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #1565c0;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }
        button:hover { background: #0d47a1; }
        #pesan {
            margin-top: 12px;
            text-align: center;
            font-size: 13px;
            color: green;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Register</h2>
        <input type="text"     id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <input type="email"    id="email"    placeholder="Email">
        <button onclick="doRegister()">Daftar</button>
        <button onclick="window.location.href='homepage.html'" style="background:#666; margin-top:8px;">Kembali ke Beranda</button>
        <p id="pesan"></p>
    </div>

    <script>
        async function doRegister() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email    = document.getElementById('email').value;
            const pesan    = document.getElementById('pesan');

            const res  = await fetch('register.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, email })
            });
            const json = await res.json();
            pesan.textContent = json.message;

            if (json.success) {
                let sisaWaktu = 15;
                pesan.textContent = `${json.message} Mengarahkan ke halaman login dalam ${sisaWaktu} detik...`;

                const timer = setInterval(() => {
                    sisaWaktu--;
                    if (sisaWaktu > 0) {
                        pesan.textContent = `${json.message} Mengarahkan ke halaman login dalam ${sisaWaktu} detik...`;
                    } else {
                        clearInterval(timer);
                        window.location.href = 'login.html';
                    }
                }, 1000);
            }
        }
    </script>
</body>
</html>
