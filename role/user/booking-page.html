<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking - Nextfly</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; color: #1b3b3b; background: #f4f1ea; }
  a { text-decoration: none; color: inherit; }

  /* NAVBAR */
  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 40px; background: #0e3b38; color: #fff;
  }
  nav .logo { font-size: 20px; font-weight: 700; }
  nav .menu { display: flex; align-items: center; gap: 24px; font-size: 14px; }
  nav .menu a:hover { color: #e8664b; }
  nav .avatar {
    width: 34px; height: 34px; border-radius: 50%; background: #e8664b;
    display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px;
  }

  main { padding: 32px 40px; max-width: 1100px; margin: 0 auto; }

  h1 { font-size: 24px; margin-bottom: 4px; }
  main > p.sub { color: #556; font-size: 14px; margin-bottom: 24px; }

  /* TAB TIKET */
  .tabs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
  .tabs button {
    background: #fff; border: 1px solid #ddd; color: #1b3b3b;
    padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 14px;
  }
  .tabs button.active { background: #0e3b38; color: #fff; border-color: #0e3b38; }

  /* SEARCH BOX */
  .search-box {
    background: #fff; border-radius: 16px; box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    display: flex; flex-wrap: wrap; overflow: hidden; margin-bottom: 32px;
  }
  .search-box .field {
    flex: 1; min-width: 180px; padding: 16px 18px; border-right: 1px solid #eee;
  }
  .search-box .field label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; }
  .search-box .field input {
    border: none; outline: none; width: 100%; font-family: 'Poppins'; font-size: 14px; color: #1b3b3b;
  }
  .search-box button {
    background: #e8664b; color: #fff; border: none; padding: 0 30px; font-weight: 600; cursor: pointer;
  }

  /* RESULT LIST */
  .results h2 { font-size: 17px; margin-bottom: 14px; }
  .result-card {
    background: #fff; border-radius: 14px; padding: 18px 22px; margin-bottom: 14px;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
  }
  .result-card .info { display: flex; gap: 14px; align-items: center; }
  .result-card .icon {
    width: 46px; height: 46px; border-radius: 12px; background: #e8f5f3;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .result-card h3 { font-size: 15.5px; margin-bottom: 3px; }
  .result-card p { font-size: 13px; color: #667; }
  .result-card .price { text-align: right; }
  .result-card .price .amount { font-size: 16px; font-weight: 700; color: #0e3b38; }
  .result-card .price .unit { font-size: 11.5px; color: #999; }
  .result-card .select-btn {
    margin-top: 8px; background: #e8664b; color: #fff; border: none; padding: 8px 20px;
    border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer;
  }

  @media (max-width: 700px) {
    nav .menu { display: none; }
    main { padding: 24px 18px; }
    .search-box .field { border-right: none; border-bottom: 1px solid #eee; }
    .result-card { flex-direction: column; align-items: flex-start; }
    .result-card .price { text-align: left; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">Nextfly</div>
  <div class="menu">
    <a href="dashboard.html">Dashboard</a>
    <a href="booking-page.html">Booking</a>
    <a href="payment.php">Pembayaran</a>
    <a href="../../login.html">Keluar</a>
  </div>
  <div class="avatar">U</div>
</nav>

<main>
  <h1>Cari & Pilih Tiket</h1>
  <p class="sub">Pilih jenis tiket, isi detail perjalanan, lalu pilih opsi yang sesuai.</p>

  <div class="tabs" id="tabs">
    <button class="active" data-tab="Hotel">🏨 Hotel</button>
    <button data-tab="Pesawat">✈️ Pesawat</button>
    <button data-tab="Kereta">🚆 Kereta</button>
    <button data-tab="Bus">🚌 Bus</button>
  </div>

  <form class="search-box" id="form">
    <div class="field">
      <label id="destLabel">Hotel Tujuan</label>
      <input type="text" placeholder="Kota, Provinsi, Negara">
    </div>
    <div class="field">
      <label>Tanggal</label>
      <input type="text" placeholder="Check in & Check out">
    </div>
    <div class="field">
      <label id="guestLabel">Tamu dan Kamar</label>
      <input type="text" placeholder="Usia & Kamar">
    </div>
    <button type="submit">Cari</button>
  </form>

  <div class="results">
    <h2 id="resultTitle">Hasil Pencarian Hotel</h2>
    <div id="resultList"></div>
  </div>
</main>

<script>
  const labels = {
    Hotel:   { dest: "Hotel Tujuan", guest: "Tamu dan Kamar", title: "Hasil Pencarian Hotel" },
    Pesawat: { dest: "Kota Tujuan", guest: "Penumpang", title: "Hasil Pencarian Pesawat" },
    Kereta:  { dest: "Stasiun Tujuan", guest: "Penumpang", title: "Hasil Pencarian Kereta" },
    Bus:     { dest: "Terminal Tujuan", guest: "Penumpang", title: "Hasil Pencarian Bus" },
  };

  const results = {
    Hotel: [
      { icon: "🏨", nama: "Swiss Belhotel Solo", ket: "Kota Surakarta, Jawa Tengah · ⭐ 4.9 (900 ulasan)", harga: "Rp 700.000", satuan: "/ malam" },
      { icon: "🏨", nama: "Gets Hotel Malang", ket: "Kota Malang, Jawa Timur · ⭐ 4.4 (388 ulasan)", harga: "Rp 460.000", satuan: "/ malam" },
      { icon: "🏨", nama: "Quest Hotel", ket: "Denpasar Barat, Bali · ⭐ 4.8 (512 ulasan)", harga: "Rp 350.000", satuan: "/ malam" },
    ],
    Pesawat: [
      { icon: "✈️", nama: "Citilink - Ekonomi", ket: "Jakarta (CGK) → Kertajati (KJT) · 06:00 - 08:50", harga: "Rp 890.000", satuan: "/ orang" },
      { icon: "✈️", nama: "Garuda Indonesia", ket: "Jakarta (CGK) → Denpasar (DPS) · 09:15 - 12:05", harga: "Rp 1.150.000", satuan: "/ orang" },
      { icon: "✈️", nama: "Lion Air", ket: "Denpasar (DPS) → Tanjung Harapan (TJS) · 14:30 - 17:20", harga: "Rp 900.000", satuan: "/ orang" },
    ],
    Kereta: [
      { icon: "🚆", nama: "Whoosh", ket: "Bandung → Jakarta · 07:00 - 10:15", harga: "Rp 150.000", satuan: "/ orang" },
      { icon: "🚆", nama: "Gajayana", ket: "Gambir → Malang · 09:30 - 13:00", harga: "Rp 85.000", satuan: "/ orang" },
      { icon: "🚆", nama: "Taksaka", ket: "Gambir → Yogyakarta · 16:00 - 19:10", harga: "Rp 120.000", satuan: "/ orang" },
    ],
    Bus: [
      { icon: "🚌", nama: "Sinar Jaya", ket: "Jabodetabek → Jakarta · 08:00 - 11:30", harga: "Rp 45.000", satuan: "/ orang" },
      { icon: "🚌", nama: "Harapan Jaya", ket: "Blitar → Kediri · 10:00 - 11:40", harga: "Rp 30.000", satuan: "/ orang" },
      { icon: "🚌", nama: "Rosalia Indah Eksekutif", ket: "Yogyakarta → Solo · 13:00 - 14:30", harga: "Rp 55.000", satuan: "/ orang" },
    ],
  };

  function renderResults(key) {
    const container = document.getElementById('resultList');
    container.innerHTML = results[key].map(item => {
      const totalNumber = item.harga.replace(/[^0-9]/g, '');
      const lokasi = item.ket.split(' · ')[0];
      const params = new URLSearchParams({
        nama_layanan: item.nama,
        lokasi: lokasi,
        total: totalNumber,
        service_type: key
      });

      return `
      <div class="result-card">
        <div class="info">
          <div class="icon">${item.icon}</div>
          <div>
            <h3>${item.nama}</h3>
            <p>${item.ket}</p>
          </div>
        </div>
        <div class="price">
          <div class="amount">${item.harga}</div>
          <div class="unit">${item.satuan}</div>
          <a href="payment.php?${params.toString()}"><button type="button" class="select-btn">Pilih</button></a>
        </div>
      </div>
      `;
    }).join('');
  }


  document.querySelectorAll('#tabs button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const key = btn.dataset.tab;
      document.getElementById('destLabel').textContent = labels[key].dest;
      document.getElementById('guestLabel').textContent = labels[key].guest;
      document.getElementById('resultTitle').textContent = labels[key].title;
      renderResults(key);
    });
  });

  document.getElementById('form').addEventListener('submit', e => e.preventDefault());

  renderResults('Hotel');
</script>

</body>
</html>
