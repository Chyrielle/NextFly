<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            background: white;
            padding: 30px;
            width: 340px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
        }
        h2 { text-align: center; margin-bottom: 20px; color: #333; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #1565c0;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }
        button:hover { background: #0d47a1; }
        #pesan {
            margin-top: 12px;
            text-align: center;
            font-size: 13px;
            color: red;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Login</h2>
        <input type="text"     id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button onclick="doLogin()">Login</button>
        <button onclick="window.location.href='homepage.html'" style="background:#666; margin-top:8px;">Kembali ke Beranda</button>
        <p id="pesan"></p>
    </div>

    <script>
        async function doLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const pesan    = document.getElementById('pesan');

            const response = await fetch('api/login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const result = await response.json();

            if (result.success) {
                localStorage.setItem('role', result.role);
                localStorage.setItem('username', result.username);

                if (result.role === 'admin')       window.location.href = 'role/admin/Admin.php';
                else if (result.role === 'editor') window.location.href = 'role/customer-service/CS.php';
                else                               window.location.href = 'role/user/User.php';
            } else {
                pesan.textContent = result.message;
            }
        }
    </script>
</body>
</html>
